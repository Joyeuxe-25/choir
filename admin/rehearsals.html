<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choir Management System - Rehearsals</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <h1>Choir Management System</h1>
            <p>Admin Area</p>
            <nav class="admin-nav">
                <a href="dashboard.html"><img src="../assets/icons/dashboard.svg" alt="" class="admin-nav-icon">Dashboard</a>
                <a href="applications.html"><img src="../assets/icons/apply.svg" alt="" class="admin-nav-icon">Applications</a>
                <a href="members.html"><img src="../assets/icons/members.svg" alt="" class="admin-nav-icon">Members</a>
                <a href="attendance.html"><img src="../assets/icons/attendance.svg" alt="" class="admin-nav-icon">Attendance</a>
                <a href="songs.html"><img src="../assets/icons/songs.svg" alt="" class="admin-nav-icon">Songs</a>
                <a href="rehearsals.html"><img src="../assets/icons/calendar-events.svg" alt="" class="admin-nav-icon">Rehearsals</a>
                <a href="events.html"><img src="../assets/icons/calendar-events.svg" alt="" class="admin-nav-icon">Events</a>
                <a href="meetings.html"><img src="../assets/icons/meetings.svg" alt="" class="admin-nav-icon">Meetings</a>
                <a href="profile.html"><img src="../assets/icons/profile.svg" alt="" class="admin-nav-icon">Profile</a>
                <a href="../auth/login.html"><img src="../assets/icons/logout.svg" alt="" class="admin-nav-icon">Logout</a>
            </nav>
        </aside>

        <div class="admin-main">
            <header class="admin-header">
                <div>
                    <p class="admin-label">Admin Panel</p>
                    <h2>Rehearsals</h2>
                </div>
            </header>

            <main class="admin-content">                <section class="admin-card wide-card">
                    <h3>Create Rehearsal</h3>
                    <p>Use this form layout to create rehearsal information for the choir.</p>
                    <form class="admin-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="rehearsalTitle">Rehearsal Title</label>
                                <input type="text" id="rehearsalTitle" name="rehearsalTitle">
                            </div>
                            <div class="form-group">
                                <label for="rehearsalDate">Date</label>
                                <input type="date" id="rehearsalDate" name="rehearsalDate">
                            </div>
                            <div class="form-group">
                                <label for="rehearsalTime">Time</label>
                                <input type="time" id="rehearsalTime" name="rehearsalTime">
                            </div>
                            <div class="form-group">
                                <label for="rehearsalLocation">Location</label>
                                <input type="text" id="rehearsalLocation" name="rehearsalLocation">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="rehearsalNotes">Notes</label>
                            <textarea id="rehearsalNotes" name="rehearsalNotes" rows="5"></textarea>
                        </div>
                        <button type="button" class="admin-button" data-message="Rehearsal created for demonstration only. No information was saved.">Create Rehearsal</button>
                    </form>
                </section>            </main>
        </div>
    </div>

    <script src="../js/admin.js"></script>
</body>
</html>
