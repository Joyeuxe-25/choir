<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choir Management System - Members</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <h1>Choir Management System</h1>
            <p>Admin Area</p>
            <nav class="admin-nav">
                <a href="dashboard.html"><img src="../assets/icons/dashboard.svg" alt="" class="admin-nav-icon">Dashboard</a>
                <a href="applications.html"><img src="../assets/icons/apply.svg" alt="" class="admin-nav-icon">Applications</a>
                <a href="members.html"><img src="../assets/icons/members.svg" alt="" class="admin-nav-icon">Members</a>
                <a href="attendance.html"><img src="../assets/icons/attendance.svg" alt="" class="admin-nav-icon">Attendance</a>
                <a href="songs.html"><img src="../assets/icons/songs.svg" alt="" class="admin-nav-icon">Songs</a>
                <a href="rehearsals.html"><img src="../assets/icons/calendar-events.svg" alt="" class="admin-nav-icon">Rehearsals</a>
                <a href="events.html"><img src="../assets/icons/calendar-events.svg" alt="" class="admin-nav-icon">Events</a>
                <a href="meetings.html"><img src="../assets/icons/meetings.svg" alt="" class="admin-nav-icon">Meetings</a>
                <a href="profile.html"><img src="../assets/icons/profile.svg" alt="" class="admin-nav-icon">Profile</a>
                <a href="../auth/login.html"><img src="../assets/icons/logout.svg" alt="" class="admin-nav-icon">Logout</a>
            </nav>
        </aside>

        <div class="admin-main">
            <header class="admin-header">
                <div>
                    <p class="admin-label">Admin Panel</p>
                    <h2>Members</h2>
                </div>
            </header>

            <main class="admin-content">                <section class="admin-card wide-card">
                    <div class="page-actions">
                        <div>
                            <h3>Manage Choir Members</h3>
                            <p>Manage choir member records using the table layout below.</p>
                        </div>
                        <button type="button" class="admin-button" data-message="Open the member form area.">Add Member</button>
                    </div>
                    <div class="table-wrapper">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Choir</th>
                                    <th>Voice Type</th>
                                    <th>Contact</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="5" class="empty-cell">No members added yet.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="button-row">
                        <button type="button" class="admin-button" data-message="Select a member row to edit.">Edit</button>
                        <button type="button" class="admin-button danger-button confirm-button" data-message="Member remove action selected. No data was deleted.">Remove</button>
                    </div>
                </section>            </main>
        </div>
    </div>

    <script src="../js/admin.js"></script>
</body>
</html>
