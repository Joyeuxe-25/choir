<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choir Management System - Signup</title>
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>

    <!-- Header and navigation -->
    <header class="site-header">
        <div class="container header-content">
            <h1>Choir Management System</h1>
            <nav>
                <a href="../html/home.html"><img src="../assets/icons/home.svg" alt="" class="nav-icon">Home</a>
                <a href="../html/choirs.html"><img src="../assets/icons/choir-users.svg" alt="" class="nav-icon">Choirs</a>
                <a href="../html/apply.html"><img src="../assets/icons/apply.svg" alt="" class="nav-icon">Apply</a>
                <a href="login.html"><img src="../assets/icons/login.svg" alt="" class="nav-icon">Login</a>
            </nav>
        </div>
    </header>

    <!-- Signup form -->
    <main class="auth-section">
        <div class="auth-card">
            <img src="../assets/icons/user.svg" alt="" class="auth-icon">
            <h2>Create Account</h2>
            <p class="auth-note">This form does not save accounts. It is only a frontend demonstration.</p>

            <form id="signupForm">
                <div class="form-group">
                    <label for="fullName"><img src="../assets/icons/user.svg" alt="" class="form-icon">Full Name</label>
                    <input type="text" id="fullName" name="fullName">
                </div>

                <div class="form-group">
                    <label for="signupEmail"><img src="../assets/icons/email.svg" alt="" class="form-icon">Email</label>
                    <input type="email" id="signupEmail" name="signupEmail">
                </div>

                <div class="form-group">
                    <label for="signupPassword"><img src="../assets/icons/login.svg" alt="" class="form-icon">Password</label>
                    <input type="password" id="signupPassword" name="signupPassword">
                </div>

                <div class="form-group">
                    <label for="confirmPassword"><img src="../assets/icons/login.svg" alt="" class="form-icon">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword">
                </div>

                <div class="form-group">
                    <label for="signupAccountType"><img src="../assets/icons/user.svg" alt="" class="form-icon">Account Type</label>
                    <select id="signupAccountType" name="signupAccountType">
                        <option value="member">Member</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <p id="signupMessage" class="form-message"></p>

                <button class="button auth-button" type="submit">Create Account</button>
            </form>

            <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p>Contact information will be added by the choir office.</p>
            <p>&copy; 2026 Choir Management System. All rights reserved.</p>
        </div>
    </footer>

    <script src="../js/auth.js"></script>
</body>
</html>
