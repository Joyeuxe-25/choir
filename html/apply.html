<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choir Management System - Apply</title>
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>

    <!-- Header and navigation -->
    <header class="site-header">
        <div class="container header-content">
            <h1>Choir Management System</h1>
            <nav>
                <a href="home.html">Home</a>
                <a href="choirs.html">Choirs</a>
                <a href="apply.html">Apply</a>
            </nav>
        </div>
    </header>

    <!-- Apply banner -->
    <section class="hero small-hero">
        <img src="../assets/apply-banner.png" alt="Choir application banner">
        <div class="hero-text">
            <h2>Choir Application Form</h2>
            <p>Fill out the form below to apply for a choir group.</p>
        </div>
    </section>

    <!-- Application form -->
    <main class="section">
        <div class="container">
            <form class="application-form" id="applicationForm">

                <!-- Personal information -->
                <h2>Personal Information</h2>

                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone">
                </div>

                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age">
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <div class="option-group">
                        <label><input type="radio" name="gender" value="male"> Male</label>
                        <label><input type="radio" name="gender" value="female"> Female</label>
                    </div>
                </div>

                <!-- Choir information -->
                <h2>Choir Information</h2>

                <div class="form-group">
                    <label for="choir">Select Choir You Want to Join</label>
                    <select id="choir" name="choir">
                        <option value="">Choose a choir</option>
                        <option value="youth">Youth Choir</option>
                        <option value="adult">Adult Choir</option>
                        <option value="children">Children Choir</option>
                        <option value="worship">Worship Team</option>
                        <option value="school">School Choir</option>
                    </select>
                    <p id="choirMessage" class="help-message"></p>
                </div>

                <div class="form-group">
                    <label for="voice">Voice Type</label>
                    <select id="voice" name="voice">
                        <option value="">Choose voice type</option>
                        <option value="soprano">Soprano</option>
                        <option value="alto">Alto</option>
                        <option value="tenor">Tenor</option>
                        <option value="bass">Bass</option>
                        <option value="not-sure">Not sure</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Singing Experience</label>
                    <div class="option-group">
                        <label><input type="radio" name="experience" value="beginner"> Beginner</label>
                        <label><input type="radio" name="experience" value="some"> Some experience</label>
                        <label><input type="radio" name="experience" value="experienced"> Experienced</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reason">Why do you want to join?</label>
                    <textarea id="reason" name="reason" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label>Available Days for Rehearsal</label>
                    <div class="option-group">
                        <label><input type="checkbox" name="days" value="monday"> Monday</label>
                        <label><input type="checkbox" name="days" value="wednesday"> Wednesday</label>
                        <label><input type="checkbox" name="days" value="friday"> Friday</label>
                        <label><input type="checkbox" name="days" value="saturday"> Saturday</label>
                    </div>
                </div>

                <p id="formMessage" class="form-message"></p>

                <!-- Submit button -->
                <div class="form-submit">
                    <button class="button" type="submit">Submit Application</button>
                </div>

            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p>Contact us: choir@church.com | +250 788 322 557</p>
            <p>&copy; 2026 Choir Management System. All rights reserved.</p>
        </div>
    </footer>

    <script src="../js/main.js"></script>
</body>
</html>
