<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choir Management System - My Songs</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/member.css">
</head>
<body>
    <div class="member-layout">
        <aside class="member-sidebar">
            <h1>Choir Management System</h1>
            <p>Member Area</p>
            <nav class="member-nav">
                <a href="dashboard.html"><img src="../assets/icons/dashboard.svg" alt="" class="member-nav-icon">Dashboard</a>
                <a href="songs.html"><img src="../assets/icons/music.svg" alt="" class="member-nav-icon">My Songs</a>
                <a href="rehearsals.html"><img src="../assets/icons/calendar-events.svg" alt="" class="member-nav-icon">Rehearsals</a>
                <a href="events.html"><img src="../assets/icons/calendar-events.svg" alt="" class="member-nav-icon">Events</a>
                <a href="profile.html"><img src="../assets/icons/profile.svg" alt="" class="member-nav-icon">Profile</a>
                <a href="../auth/login.html"><img src="../assets/icons/logout.svg" alt="" class="member-nav-icon">Logout</a>
            </nav>
        </aside>

        <div class="member-main">
            <header class="member-header">
                <div>
                    <p class="member-label">Member Panel</p>
                    <h2>My Songs</h2>
                </div>
            </header>

            <main class="member-content">                <section class="member-card wide-card">
                    <h3>Song Library</h3>
                    <p>Use this page to browse choir songs and practice materials.</p>
                    <div class="search-box">
                        <label for="songSearch">Search Songs</label>
                        <input type="text" id="songSearch" name="songSearch" placeholder="Search area only">
                    </div>
                </section>

                <section class="member-card wide-card">
                    <h3>Song List</h3>
                    <div class="song-list-placeholder">
                        <div class="song-item empty-song-item">
                            <div>
                                <p class="placeholder-label">Song title area</p>
                                <p class="placeholder-label">Choir/category area</p>
                                <p class="placeholder-label">Practice material area</p>
                            </div>
                            <div class="button-row">
                                <button type="button" class="member-button" data-message="Select a song to view lyrics.">View Lyrics</button>
                                <button type="button" class="member-button" data-message="Select a song to listen.">Listen</button>
                                <button type="button" class="member-button" data-message="Select a song to download.">Download</button>
                            </div>
                        </div>
                        <p class="empty-state">No songs available yet.</p>
                    </div>
                </section>            </main>
        </div>
    </div>

    <script src="../js/member.js"></script>
</body>
</html>
